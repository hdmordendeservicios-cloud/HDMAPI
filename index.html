<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Portal Operativo - HDM</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#005B9A", 
                        "primary-dark": "#004575",
                        "surface": "#FFFFFF",
                        "background": "#F8FAFC",
                        "text-main": "#1E293B",
                        "text-sub": "#64748B",
                    },
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    boxShadow: { 'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04)' }
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0084CA 0%, #005B9A 100%); background-attachment: fixed; }
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; border: 2px solid #e2e8f0; }
        #reader video { object-fit: cover; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 antialiased">
    
    <div class="w-full max-w-[420px] bg-surface rounded-2xl shadow-premium border border-slate-100 overflow-hidden">
        <div class="p-8">
            <div class="flex flex-col items-center mb-4">
                <img src="https://i.ibb.co/rCsz6hh/LOGOTIPO.png" alt="Logo HDM" class="mb-5 object-contain" style="height: 7.2rem;"> 
                <h1 class="text-2xl font-semibold text-text-main tracking-tight">Bienvenido</h1>
                <p class="text-[15px] text-text-sub mt-1 text-center">Sistemas de Filtración de Agua SA. de C.V.</p>
            </div>
            
            <form id="loginForm" class="space-y-5 block">
                <div class="space-y-1.5">
                    <label class="text-[13px] font-medium text-slate-700 ml-0.5" for="username">Usuario</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl">person</span>
                        <input required autocomplete="username" class="block w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-lg text-text-main placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all text-sm uppercase" id="username" placeholder="ID" type="text">
                    </div>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-[13px] font-medium text-slate-700 ml-0.5" for="password">Contraseña</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl">lock</span>
                        <input required autocomplete="current-password" class="block w-full pl-12 pr-12 py-3 bg-white border border-slate-200 rounded-lg text-text-main placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all text-sm" id="password" placeholder="••••••••" type="password">
                        <button class="absolute right-4 flex items-center text-slate-400 hover:text-primary transition-colors" onclick="togglePassword()" type="button">
                            <span class="material-symbols-outlined text-xl" id="toggleIcon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <div id="alertMessage" class="hidden py-2.5 px-3 bg-red-50 border border-red-200 text-red-600 text-[13px] font-medium rounded-lg text-center transition-all"></div>
                
                <button id="submitBtn" class="w-full flex justify-center items-center py-3.5 px-4 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-primary-dark shadow-sm transition-all active:scale-[0.98]" type="submit">
                    Iniciar Sesión
                </button>
            </form>

            <div id="mainMenu" class="hidden space-y-5 animate-fade-in mt-4">
                
                <div class="bg-slate-50 border-l-4 border-primary p-3 rounded-r-lg shadow-sm flex flex-col">
                    <span class="text-[10px] font-bold text-primary tracking-wider uppercase">Usuario:</span>
                    <span id="resName" class="text-sm font-semibold text-text-main">Cargando...</span>
                    <span class="text-[10px] font-bold text-primary tracking-wider uppercase mt-2">Cargo:</span>
                    <span id="resPos" class="text-xs font-medium text-slate-500">---</span>
                </div>

                <div class="bg-blue-50 border border-primary/20 p-3 rounded-lg text-center shadow-inner">
                    <p class="text-[11px] font-bold text-primary tracking-wider mb-1 uppercase">Folio Generado</p>
                    <p id="folioDisp" class="text-xl font-extrabold text-primary tracking-widest">Generando...</p>
                </div>

                <div class="bg-[#f0fdf4] border-l-4 border-[#16a34a] p-3 rounded-r-lg shadow-sm">
                    <p class="text-[11px] font-bold text-[#16a34a] tracking-wider mb-1 uppercase">Sucursal Detectada:</p>
                    <p id="resBranch" class="text-sm font-bold text-[#15803d]">ESPERANDO ESCANEO...</p>
                </div>

                <div id="reader" class="shadow-sm"></div>

                <div class="space-y-2 pt-2 border-t border-slate-100">
                    <label class="text-[13px] font-semibold text-slate-700">Seleccione Servicio:</label>
                    <select id="optionSelect" class="block w-full py-3 px-4 bg-white border border-slate-200 rounded-lg text-sm text-text-main font-medium focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="">-- SELECCIONAR --</option>
                        <option value="ServicioCorrectivo">Orden de Servicio Correctivo</option>
                        <option value="ServicioInstalaciones">Orden de Servicio Instalaciones</option>
                        <option value="ServicioMantenimiento">Orden de Servicio Mantenimiento</option>
                        <option value="ServicioReporteVisita">Orden de Servicio Reporte de Visita</option>
                    </select>
                </div>

                <button id="btnContinuar" class="w-full py-3.5 mt-2 rounded-lg text-sm font-semibold text-white bg-[#16a34a] hover:bg-[#15803d] transition-all opacity-50 cursor-not-allowed" disabled>
                    CONTINUAR
                </button>
            </div>
            
        </div>
    </div>
    
    <div class="mt-6 text-center">
        <p class="text-[12px] font-medium uppercase tracking-widest text-white/60">
            © 2026 HDM MÉXICO. Todos los derechos reservados.
        </p>
    </div>

    <script>
        // ======================================================================
        // 🔴 PEGA AQUÍ TU ENLACE DE GOOGLE APPS SCRIPT (El que termina en /exec)
        // ======================================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxbjed8pi9TohcQ8_mkUn5GW6M89HqNN0dhfZo5XnVXwp1STyA3Pv4aFczQAUk8XYkjbA/exec";

        let html5QrCode;
        let globalFolio = "";
        let isBranchScanned = false;
        let escaneoBloqueado = false;

        const URL_MAP = {
            'ServicioCorrectivo': 'https://docs.google.com/forms/d/e/1FAIpQLSexALVRaCItCODgce3_1U-sfRaMAQq365o57xIJvikpNMc40A/viewform?usp=pp_url&entry.833549862=COEM-',
            'ServicioInstalaciones': 'https://docs.google.com/forms/d/e/1FAIpQLSczsSDydxhwDe6Up62D0dd3R6DZND5wQ1nvgySBAXkNm0fTNA/viewform?usp=pp_url&entry.1407249899=INST-',
            'ServicioMantenimiento': 'https://docs.google.com/forms/d/e/1FAIpQLSdAWJ86UbY8cWq76Lzv3AJjfgkQp6JyNe7lClGYa9JePJ4jmw/viewform?usp=pp_url&entry.1296392221=MANT-',
            'ServicioReporteVisita': 'https://docs.google.com/forms/d/e/1FAIpQLSfj6ZjnKHhc3h-HGGj2q7HcRTuYOcLvQnMws8K3998V5hh_cQ/viewform?usp=pp_url&entry.1483243805=RTDV-'
        };

        // Función API universal
        async function apiCall(action, params = {}) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, ...params })
                });
                return await response.json();
            } catch (error) { return { status: 'error' }; }
        }

        function togglePassword() {
            const p = document.getElementById('password');
            const i = document.getElementById('toggleIcon');
            if (p.type === 'password') { p.type = 'text'; i.textContent = 'visibility'; } 
            else { p.type = 'password'; i.textContent = 'visibility_off'; }
        }

        // MOTOR DE CÁMARA SILENCIOSO
        function startScanner() {
            const config = { fps: 10, qrbox: { width: 220, height: 220 } };
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(function() {
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess)
                .catch(e => console.log("Cámara denegada", e));
            });
        }

        async function onScanSuccess(decodedText) {
            if (escaneoBloqueado || isBranchScanned) return; 
            escaneoBloqueado = true;
            
            document.getElementById('resBranch').innerHTML = '<span class="animate-pulse text-primary">Buscando Sucursal...</span>';
            
            const r = await apiCall('getBranchFromCatalog', { qrContent: decodedText });
            
            if(r.status === 'success') {
                document.getElementById('resBranch').innerText = r.branchName;
                isBranchScanned = true;
                validarBoton();
                if(globalFolio) apiCall('updateFolioBranch', { folio: globalFolio, branchName: r.branchName });
            } else {
                document.getElementById('resBranch').innerHTML = '<span class="text-red-600">QR No Reconocido.</span>';
                setTimeout(() => { escaneoBloqueado = false; }, 2000); // 2 segundos de respiro
            }
        }

        function validarBoton() {
            const btn = document.getElementById('btnContinuar');
            if(isBranchScanned && document.getElementById('optionSelect').value !== '') {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('shadow-lg');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }
        document.getElementById('optionSelect').addEventListener('change', validarBoton);

        // LOGIN Y TRANSICIÓN
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const alertMsg = document.getElementById('alertMessage');
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            alertMsg.classList.add('hidden');
            btn.innerText = 'VERIFICANDO...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            // 1. TRANSICIÓN INSTANTÁNEA (Engaña al navegador)
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('mainMenu').classList.remove('hidden');
            
            // 2. ARRANCA LA CÁMARA AL INSTANTE DEL CLIC
            startScanner();

            // 3. REVISA EN SEGUNDO PLANO
            const res = await apiCall('getEmployeeData', { username: u, password: p });

            if (res.status === 'success' && res.esValido) {
                // Usuario correcto
                document.getElementById('resName').innerText = res.name;
                document.getElementById('resPos').innerText = res.position;
                
                // Pedir Folio Nuevo
                const folioData = await apiCall('getNextFolio', { userName: res.name });
                if (folioData.status === 'success') {
                    globalFolio = folioData.folio;
                    document.getElementById('folioDisp').innerText = globalFolio;
                    if(isBranchScanned) { // Si escaneó rapidísimo
                        apiCall('updateFolioBranch', { folio: globalFolio, branchName: document.getElementById('resBranch').innerText });
                    }
                }
            } else {
                // Si falla la contraseña, se apaga todo y regresa
                if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(e=>e);
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('loginForm').style.display = 'block';
                
                alertMsg.innerText = "Credenciales incorrectas.";
                alertMsg.classList.remove('hidden');
                btn.innerText = 'INICIAR SESIÓN';
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        // BOTÓN FINAL REDIRECCIÓN
        document.getElementById('btnContinuar').onclick = function() {
            const opcion = document.getElementById('optionSelect').value;
            window.top.location.href = URL_MAP[opcion];
        };
    </script>
</body>
</html>
